# Hackathon B300 Configuration
# GPU MODE IRL Hackathon - PyTorch Conference Europe 2026
# Optimized for fast loss descent on B300 cluster (360 PFLOP/s BF16)
#
# Key choices:
# - Token-Routed MLP (4 experts) — 4x capacity, 1/4 compute per token
# - Mu projection (no PID) — mu guidance without dynamics overhead
# - GQA — memory efficient attention
# - QK Norm — training stability
# - Muon optimizer (see training/muon.py)
#
# Launch:
#   torchrun --nproc_per_node=2 scripts/train_hackathon.py                    # 2 GPU test
#   torchrun --nproc_per_node=8 scripts/train_hackathon.py                    # single node
#   torchrun --nnodes=N --nproc_per_node=8 --master_addr=$MASTER_ADDR \
#     --master_port=29500 --node_rank=$NODE_RANK scripts/train_hackathon.py   # multi-node

# Architecture — ~1.5B params, sweet spot for limited-time pre-training
hidden_size: 2048
num_hidden_layers: 24
num_attention_heads: 16
num_key_value_heads: 4  # GQA: 4 KV heads
intermediate_size: 5632
vocab_size: 32000

# Attention
attention_type: gqa
attention_dropout: 0.0
use_qk_norm: true
sliding_window: null

# Position
max_position_embeddings: 2048
rope_theta: 10000.0
rope_type: standard

# MLP — dense SwiGLU (no MoE for simplicity on day-1)
mlp_type: swiglu
hidden_act: silu
num_experts: 1

# Mu projection — lightweight mu guidance, no PID
use_inl_dynamics: false
use_mu_projection: true
disable_mu_guidance: false

# Normalization
norm_type: rmsnorm
norm_eps: 1e-6

# Other
tie_word_embeddings: true
use_sdpa: true
initializer_range: 0.02
