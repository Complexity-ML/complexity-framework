run:
  profile: 100m
  dataset: text
  text_file: /Users/boris/Dev/complexity-framework/data/local/fineweb_sample.txt
  tokenizer: /Users/boris/Dev/complexity-framework/tokenizer-o200k
  steps: 200
  batch_size: 4
  seq_len: 256
  hidden_size: 384
  num_hidden_layers: 10
  num_attention_heads: 8
  num_key_value_heads: 2
  intermediate_size: 1248
  shared_intermediate_size: 768
  mlp_type: lexical_modulated
  lexical_object_rank: 16
  lexical_object_gate_init: 0.1
  tie_lexical_object_embeddings: true
  bf16: true
  grad_ckpt: false
  eval_steps: 50
  eval_batches: 2
  log_steps: 10
  loss_chunk_tokens: 512
  optimizer: adamw
  lr: 0.0003
  weight_decay: 0.1
  save_steps: 0
  seed: 42
  use_custom_kernels: false
  cggr: false
  run_name: local-200-100m_o200k_lexical_object
  save_dir: checkpoints/local-200-100m_o200k_lexical_object