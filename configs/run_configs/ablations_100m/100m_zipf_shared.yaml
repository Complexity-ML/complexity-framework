run:
  profile: 100m
  dataset: fineweb
  tokenizer: ./tokenizer-o200k
  steps: 954
  batch_size: 256
  seq_len: 2048
  intermediate_size: 768
  shared_intermediate_size: 768
  bf16: true
  grad_ckpt: false
  eval_steps: 100
  eval_batches: 16
  log_steps: 10
  save_steps: 954
  save_total_limit: 2
  loss_chunk_tokens: 1024
  top_k: 2
  top_k_primary_weight: 0.5
  top_k_primary_weight_final: 0.5
  routing_strategy: zipf
  shared_expert: true
  learn_shared_routed_gates: true
  shared_gate_init: 1.0
  routed_gate_init: 0.5
  use_custom_kernels: auto
  cggr: auto
  run_name: abl-4b-100m_zipf_shared
  save_dir: checkpoints/abl-4b-100m_zipf_shared
