run:
  profile: 100m
  dataset: fineweb
  tokenizer: tokenizer-o200k
  steps: 120
  batch_size: 16
  seq_len: 2048
  hidden_size: 384
  num_hidden_layers: 10
  num_attention_heads: 8
  num_key_value_heads: 2
  attention_type: gqa
  mlp_type: lexical_object_micro_expert
  intermediate_size: 1118
  shared_intermediate_size: 768
  lexical_object_rank: 16
  tie_lexical_object_embeddings: true
  lexical_object_gate_init: 0.1
  micro_num_experts: 4
  micro_expert_width: 32
  micro_expert_gate_init: 0.1
  bf16: true
  grad_ckpt: false
  compile: true
  compile_mode: reduce-overhead
  eval_steps: 0
  eval_batches: 8
  log_steps: 10
  loss_backend: chunked
  loss_chunk_tokens: 512
  optimizer: adamw
  # Smoke-only stability LR; full 3052-step controls use 4e-4 with long warmup.
  lr: 0.00001
  weight_decay: 0.1
  max_grad_norm: 0.0
  save_steps: 0
  save_total_limit: 0
  seed: 42
  use_custom_kernels: auto
  cggr: false
  run_name: h200-smoke-matched-gqa
  save_dir: runs/h200-smoke-matched-gqa
