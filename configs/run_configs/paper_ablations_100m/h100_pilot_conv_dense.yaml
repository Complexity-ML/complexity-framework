run:
  profile: 100m
  dataset: fineweb
  tokenizer: tokenizer-o200k
  steps: 3052
  batch_size: 16
  seq_len: 2048
  hidden_size: 384
  num_hidden_layers: 10
  num_attention_heads: 8
  num_key_value_heads: 2
  attention_type: causal_conv
  causal_conv_kernel_size: 4
  causal_conv_dilation_cycle: 8
  mlp_type: swiglu
  intermediate_size: 1470
  shared_intermediate_size: 768
  bf16: true
  grad_ckpt: false
  eval_steps: 250
  eval_batches: 8
  log_steps: 10
  loss_backend: chunked
  loss_chunk_tokens: 512
  optimizer: adamw
  lr: 0.0003
  weight_decay: 0.1
  save_steps: 0
  save_total_limit: 0
  seed: 42
  use_custom_kernels: false
  cggr: false
  run_name: h100-pilot-100m-conv-dense-100m-token
  save_dir: checkpoints/h100-pilot-100m-conv-dense-100m-token
