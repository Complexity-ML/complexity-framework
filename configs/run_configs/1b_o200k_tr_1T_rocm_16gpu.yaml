# 1B Token-Routed o200k — 1T tokens overtraining on 16x MI300X (2 nodes).
#
# Topology:
#   2 nodes × 8 MI300X = 16 GPUs total
#   DDP (model fits on 1 GPU, no FSDP needed → avoids the save_pretrained
#   full_tensor() NCCL hang)
#   No TP / no PP — pure data parallelism.
#
# Token math:
#   tokens_per_step = batch_size × world_size × grad_accum × seq_len
#                   = 16        × 16         × 2          × 2048
#                   = 1,048,576  (~1.05M tokens/step)
#   1T / 1.05M     ≈ 953,675 steps
#
# Compute estimate (MI300X ~1.3 PFLOPS BF16, 45% MFU on multi-node DDP):
#   6 × 1e9 × 1e12 = 6e21 FLOPs
#   16 × 1.3e15 × 0.45 × 0.85 (multi-node penalty) ≈ 7.96 PFLOPS effective
#   ≈ 8.7 days wall-clock
#
# Launch (on each node, NODE_RANK=0 and NODE_RANK=1 respectively):
#   ./scripts/launch_rocm_multinode.sh \
#       --nnodes 2 --node-rank $NODE_RANK \
#       --master-addr $MASTER_NODE_IP \
#       --config configs/run_configs/1b_o200k_tr_1T_rocm_16gpu.yaml

world_size: 16
nnodes: 2
nproc_per_node: 8

model:
  profile: 1b
  tokenizer: ./tokenizer-o200k
  vocab_size: 200019

# DDP path (model is small enough — 1B fits on a single MI300X easily).
# Set use_fsdp: false to skip the FSDP wrap and use plain DDP instead.
# This is the configuration that avoids the FSDP save_pretrained NCCL hang.
parallel:
  use_fsdp: false
  micro_batch_size: 16
  gradient_accumulation: 2

run:
  profile: 1b
  dataset: fineweb
  tokenizer: ./tokenizer-o200k
  target_tokens: 1000000000000  # 1T
  batch_size: 16
  seq_len: 2048
  gradient_accumulation: 2
  lr: 3.0e-4
  warmup_steps: 2000
  lr_scheduler: cosine
  optimizer: adamw
  bf16: true
  grad_ckpt: true              # cheap insurance even though 1B fits
  precision: bf16

  eval_steps: 2000
  eval_batches: 16
  log_steps: 20

  # Checkpointing — agressif vu la durée du run (~8 jours).
  # save_steps every ~2h: 1.05M tok/step, ~3 TFLOP*s/step at 45% MFU
  # ⇒ ~0.6s/step (best case), so ~12000 steps = 2h.
  save_steps: 12000
  save_total_limit: 5

  loss_chunk_tokens: 1024
  routing_strategy: zipf
  top_k: 2
  top_k_primary_weight: 0.5
  static_expert_capacity: false
  learn_shared_routed_gates: true
  shared_gate_init: 1.0
  routed_gate_init: 0.1

  # ROCm: framework's auto policy disables Triton on ROCm by default
  # (set COMPLEXITY_ALLOW_ROCM_TRITON=1 to opt in to experimental kernels).
  use_custom_kernels: auto
  empty_cache_every: 0

  run_name: 1b-o200k-tr-1T-rocm-16gpu-ddp
  save_dir: checkpoints/1b-o200k-tr-1T-rocm-16gpu-ddp
