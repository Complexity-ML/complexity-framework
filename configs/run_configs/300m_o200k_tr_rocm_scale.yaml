run:
  profile: 300m
  dataset: fineweb
  tokenizer: ./tokenizer-o200k
  steps: 5000
  batch_size: 2
  seq_len: 1024
  lr: 2.0e-4
  optimizer: adamw
  bf16: true
  grad_ckpt: true
  eval_steps: 500
  eval_batches: 8
  log_steps: 20
  save_steps: 1000
  save_total_limit: 3
  loss_chunk_tokens: 512
  routing_strategy: zipf
  top_k: 2
  top_k_primary_weight: 0.5
  use_custom_kernels: auto
  empty_cache_every: 0
  run_name: rocm-300m-o200k-tr-scale
  save_dir: checkpoints/rocm-300m-o200k-tr-scale
